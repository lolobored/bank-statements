name: Version Bump PR

on:
  push:
    branches:
      - 'version-bump/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR with auto-merge
        run: |
          VERSION="${GITHUB_REF#refs/heads/version-bump/}"
          PR_URL=$(gh pr create \
            --title "chore: bump version to ${VERSION}" \
            --body "Automated version bump after release." \
            --base main \
            --head "${{ github.ref_name }}")
          gh pr merge "$PR_URL" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
