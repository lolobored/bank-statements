name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: gradle

      - name: Build bootJar
        run: ./gradlew bootJar -Pversion=${{ github.ref_name }}

      - name: Create GitHub Release
        run: |
          JAR=$(ls build/libs/bank-statements-*.jar | grep -v plain)
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "$JAR" \
            download-ofx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
