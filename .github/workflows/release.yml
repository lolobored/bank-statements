name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Create GitHub Release
        run: |
          JAR=$(ls build/libs/bank-statements-*.jar | grep -v plain)
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "$JAR#bank-statements.jar" \
            download-ofx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
